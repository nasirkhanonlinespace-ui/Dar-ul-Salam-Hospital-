<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><title>RTDB Test</title></head>
<body>
<h2>Realtime Database Test</h2>
<div id="status">Loading...</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" onload="log('app loaded')" onerror="log('app FAILED')"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js" onload="log('db loaded')" onerror="log('db FAILED')"></script>
<script>
var st=document.getElementById('status');
function log(m){st.innerHTML+='<br>'+m;}
window.addEventListener('load',function(){
  try{
    firebase.initializeApp({
      apiKey:"AIzaSyDtZ4TdDSTbz3mE-P0wglyqRQNKI0seGPo",
      databaseURL:"https://dar-ul-salam-hospital-ry-382e2-default-rtdb.firebaseio.com",
      projectId:"dar-ul-salam-hospital-ry-382e2"
    });
    var db=firebase.database();
    log('Firebase ready, writing...');
    db.ref('test/ping').set({t:Date.now(),msg:'hello'})
      .then(function(){log('<b style="color:green">✅ SUCCESS! RTDB works!</b>');})
      .catch(function(e){log('<b style="color:red">❌ FAILED: '+e.message+'</b>');});
  }catch(e){log('❌ INIT ERROR: '+e.message);}
});
</script>
</body>
</html>
