<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><title>Firebase Test</title></head>
<body>
<h2>Firebase Connection Test</h2>
<div id="status">Testing...</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var status = document.getElementById('status');
try {
  firebase.initializeApp({
    apiKey: "AIzaSyDtZ4TdDSTbz3mE-P0wglyqRQNKI0seGPo",
    authDomain: "dar-ul-salam-hospital-ry-382e2.firebaseapp.com",
    projectId: "dar-ul-salam-hospital-ry-382e2",
    storageBucket: "dar-ul-salam-hospital-ry-382e2.firebasestorage.app",
    messagingSenderId: "659652861452",
    appId: "1:659652861452:web:177d4d38c31909bee99829"
  });
  var db = firebase.firestore();
  db.settings({ experimentalForceLongPolling: true, merge: true });
  status.innerHTML = '⏳ Firebase loaded, testing write...';
  db.collection("test").doc("ping").set({ t: Date.now(), msg: "hello" })
    .then(function() {
      status.innerHTML = '<span style="color:green;font-size:1.5rem;">✅ FIREBASE WORKS! Data saved!</span>';
    })
    .catch(function(e) {
      status.innerHTML = '<span style="color:red;">❌ WRITE FAILED: ' + e.code + ' — ' + e.message + '</span>';
    });
} catch(e) {
  status.innerHTML = '<span style="color:red;">❌ INIT FAILED: ' + e.message + '</span>';
}
</script>
</body>
</html>
